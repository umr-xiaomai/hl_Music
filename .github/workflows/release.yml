name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows-linux:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            name: windows-x64
          - os: ubuntu-latest
            rid: linux-x64
            name: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            name: linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Linux NativeAOT prerequisites
        if: ${{ startsWith(matrix.os, 'ubuntu') }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - name: Install Velopack CLI
        shell: bash
        run: dotnet tool install -g vpk

      - name: Publish App
        shell: bash
        run: |
          CLEAN_VERSION=${GITHUB_REF_NAME#v}
          dotnet publish ./KugouAvaloniaPlayer/KugouAvaloniaPlayer.csproj \
            -c Release \
            "-p:BUILD_VERSION=$CLEAN_VERSION" \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishAot=true \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -o ./publish

      - name: Remove debug symbol files
        shell: bash
        run: |
          find ./publish -type d -name '*.dSYM' -prune -exec rm -rf {} +
          find ./publish -type f \( -name '*.pdb' -o -name '*.dbg' \) -delete

      - name: Pack with Velopack
        if: ${{ matrix.rid != 'linux-arm64' }}
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}

          EXE_NAME="KugouAvaloniaPlayer"
          ICON_PATH="./KugouAvaloniaPlayer/Assets/Test.png"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            EXE_NAME="KugouAvaloniaPlayer.exe"
            ICON_PATH="./KugouAvaloniaPlayer/Assets/Test.ico"
          fi

          vpk pack \
            -u KugouAvaloniaPlayer \
            -v "$VERSION" \
            -p ./publish \
            -e "$EXE_NAME" \
            -i "$ICON_PATH" \
            -o ./releases

      - name: Create linux-arm64 archive (no auto-update)
        if: ${{ matrix.rid == 'linux-arm64' }}
        shell: bash
        run: |
          mkdir -p ./releases
          tar -czf ./releases/KugouAvaloniaPlayer-linux-arm64.tar.gz -C ./publish .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: releases-${{ matrix.name }}
          path: ./releases/*

  build-macos:
    strategy:
      matrix:
        include:
          - os: macos-latest
            rid: osx-arm64
            name: macos-arm64
          - os: macos-15-intel
            rid: osx-x64
            name: macos-x64

    runs-on: ${{ matrix.os }}

    env:
      APP_NAME: KugouAvaloniaPlayer
      BUNDLE_ID: com.KugouAvaloniaPlayer.KugouAvaloniaPlayer
      RID: ${{ matrix.rid }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Velopack CLI
        shell: bash
        run: dotnet tool install -g vpk

      - name: Set version
        shell: bash
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build macOS icon (.icns)
        shell: bash
        run: |
          ICONSET_DIR="./dist/AppIcon.iconset"
          SOURCE_PNG="./KugouAvaloniaPlayer/Assets/Test.png"
          ICNS_PATH="./dist/KugouAvaloniaPlayer.icns"

          mkdir -p "$ICONSET_DIR"

          sips -z 16 16 "$SOURCE_PNG" --out "$ICONSET_DIR/icon_16x16.png"
          sips -z 32 32 "$SOURCE_PNG" --out "$ICONSET_DIR/icon_16x16@2x.png"
          sips -z 32 32 "$SOURCE_PNG" --out "$ICONSET_DIR/icon_32x32.png"
          sips -z 64 64 "$SOURCE_PNG" --out "$ICONSET_DIR/icon_32x32@2x.png"
          sips -z 128 128 "$SOURCE_PNG" --out "$ICONSET_DIR/icon_128x128.png"
          sips -z 256 256 "$SOURCE_PNG" --out "$ICONSET_DIR/icon_128x128@2x.png"
          sips -z 256 256 "$SOURCE_PNG" --out "$ICONSET_DIR/icon_256x256.png"
          sips -z 512 512 "$SOURCE_PNG" --out "$ICONSET_DIR/icon_256x256@2x.png"
          sips -z 512 512 "$SOURCE_PNG" --out "$ICONSET_DIR/icon_512x512.png"
          sips -z 1024 1024 "$SOURCE_PNG" --out "$ICONSET_DIR/icon_512x512@2x.png"

          iconutil -c icns "$ICONSET_DIR" -o "$ICNS_PATH"

      - name: Publish macOS files
        shell: bash
        run: |
          dotnet publish ./KugouAvaloniaPlayer/KugouAvaloniaPlayer.csproj \
            -c Release \
            "-p:BUILD_VERSION=$VERSION" \
            -r "$RID" \
            --self-contained true \
            -p:PublishAot=true \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -o ./publish/macos

      - name: Remove debug symbol files
        shell: bash
        run: |
          find ./publish/macos -type d -name '*.dSYM' -prune -exec rm -rf {} +
          find ./publish/macos -type f \( -name '*.pdb' -o -name '*.dbg' \) -delete

      - name: Create .app bundle
        shell: bash
        run: |
          APP="./dist/${APP_NAME}.app"

          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          cp -R ./publish/macos/* "$APP/Contents/MacOS/"

          cat > "$APP/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleDisplayName</key>
            <string>${APP_NAME}</string>
            <key>CFBundleExecutable</key>
            <string>${APP_NAME}</string>
            <key>CFBundleIdentifier</key>
            <string>${BUNDLE_ID}</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>${APP_NAME}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

          chmod +x "$APP/Contents/MacOS/${APP_NAME}"

      - name: Show app structure
        shell: bash
        run: |
          find "./dist/${APP_NAME}.app" -maxdepth 3 | sort

      - name: Smoke run app binary
        shell: bash
        run: |
          APP_BIN="./dist/${APP_NAME}.app/Contents/MacOS/${APP_NAME}"

          "$APP_BIN" > smoke.log 2>&1 &
          APP_PID=$!

          sleep 8

          if ps -p "$APP_PID" > /dev/null; then
            echo "App is still running after 8s, treating as smoke-pass"
            kill "$APP_PID" || true
          else
            echo "App exited before 8s"
          fi

          cat smoke.log || true

      - name: Zip app bundle
        shell: bash
        run: |
          mkdir -p ./releases
          ditto -c -k --sequesterRsrc --keepParent \
            "./dist/${APP_NAME}.app" \
            "./releases/${APP_NAME}-${RID}.app.zip"

      - name: Build unsigned pkg
        if: ${{ matrix.rid == 'osx-arm64' }}
        shell: bash
        run: |
          mkdir -p ./pkgroot/Applications
          cp -R "./dist/${APP_NAME}.app" "./pkgroot/Applications/"

          pkgbuild \
            --root ./pkgroot \
            --identifier "${BUNDLE_ID}" \
            --version "${VERSION}" \
            --install-location / \
            "./releases/${APP_NAME}-${RID}-unsigned.pkg"

      - name: Inspect pkg signature status
        if: ${{ matrix.rid == 'osx-arm64' }}
        shell: bash
        run: |
          spctl -a -vv -t install "./releases/${APP_NAME}-${RID}-unsigned.pkg" || true
          pkgutil --check-signature "./releases/${APP_NAME}-${RID}-unsigned.pkg" || true

      - name: Pack with Velopack (macOS)
        if: ${{ matrix.rid == 'osx-arm64' }}
        shell: bash
        run: |
          vpk pack \
            -u KugouAvaloniaPlayer \
            -v "$VERSION" \
            -p ./publish/macos \
            -e "$APP_NAME" \
            -i ./dist/KugouAvaloniaPlayer.icns \
            -o ./releases

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: releases-${{ matrix.name }}
          path: ./releases/*

  release:
    needs:
      - build-windows-linux
      - build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all_artifacts

      - name: Prepare Clean Release
        shell: bash
        run: |
          mkdir -p ./release_files

          cp ./all_artifacts/releases-windows-x64/*.exe ./release_files/KugouAvaloniaPlayer-win-x64.exe 2>/dev/null || true
          cp ./all_artifacts/releases-linux-x64/*.AppImage ./release_files/KugouAvaloniaPlayer-linux-x64.AppImage 2>/dev/null || true
          cp ./all_artifacts/releases-linux-arm64/*.tar.gz ./release_files/KugouAvaloniaPlayer-linux-arm64.tar.gz 2>/dev/null || true

          cp ./all_artifacts/releases-macos-arm64/*osx-arm64.app.zip ./release_files/KugouAvaloniaPlayer-mac-arm64.app.zip 2>/dev/null || true
          cp ./all_artifacts/releases-macos-x64/*osx-x64.app.zip ./release_files/KugouAvaloniaPlayer-mac-x64.app.zip 2>/dev/null || true
          cp ./all_artifacts/releases-macos-arm64/*-osx-Setup.pkg ./release_files/KugouAvaloniaPlayer-mac-arm64-Setup.pkg 2>/dev/null || true

          cp ./all_artifacts/releases-windows-x64/*.nupkg ./release_files/ 2>/dev/null || true
          cp ./all_artifacts/releases-linux-x64/*.nupkg ./release_files/ 2>/dev/null || true
          cp ./all_artifacts/releases-macos-arm64/*.nupkg ./release_files/ 2>/dev/null || true

          cp ./all_artifacts/releases-windows-x64/RELEASES* ./release_files/ 2>/dev/null || true
          cp ./all_artifacts/releases-linux-x64/RELEASES* ./release_files/ 2>/dev/null || true
          cp ./all_artifacts/releases-macos-arm64/RELEASES* ./release_files/ 2>/dev/null || true

          cp ./all_artifacts/releases-windows-x64/releases.*.json ./release_files/ 2>/dev/null || true
          cp ./all_artifacts/releases-linux-x64/releases.*.json ./release_files/ 2>/dev/null || true
          cp ./all_artifacts/releases-macos-arm64/releases.*.json ./release_files/ 2>/dev/null || true

          ls -lah ./release_files

      - name: Extract latest changelog from README
        shell: bash
        run: |
          awk '
            /^## 更新日志/ { inlog=1; next }
            inlog && /^### v/ && !found { found=1; print; next }
            found && /^### v/ { exit }
            found { print }
          ' README.md > RELEASE_NOTES.md

          if [[ ! -s RELEASE_NOTES.md ]]; then
            echo "未从 README.md 提取到更新日志，回退到默认文案。"
            {
              echo "### ${GITHUB_REF_NAME}"
              echo
              echo "- 请查看提交记录与附件了解本次更新内容。"
            } > RELEASE_NOTES.md
          fi

          echo "==== RELEASE_NOTES.md ===="
          cat RELEASE_NOTES.md

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: ./release_files/*
          body_path: RELEASE_NOTES.md
          token: ${{ secrets.GITHUB_TOKEN }}
